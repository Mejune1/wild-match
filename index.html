<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wild Match – Animal Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Titan+One&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a4a2e;
    --green-mid: #2d7a4f;
    --green-light: #4caf78;
    --green-pale: #a8e6c1;
    --yellow: #f9d342;
    --orange: #f4824a;
    --cream: #fdf6e3;
    --brown: #5c3d1e;
    --shadow: rgba(26,74,46,0.35);
    --card-back: #2d7a4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--green-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated leaf background */
  .bg-leaves {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
  }
  .leaf {
    position: absolute; font-size: 1.6rem; opacity: 0.13;
    animation: floatLeaf linear infinite;
  }
  @keyframes floatLeaf {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0.1; }
    50% { opacity: 0.18; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* HEADER */
  header {
    position: relative; z-index: 10;
    width: 100%; max-width: 480px;
    text-align: center;
    padding: 18px 16px 8px;
  }
  .game-title {
    font-family: 'Titan One', cursive;
    font-size: 2.4rem;
    color: var(--yellow);
    text-shadow: 3px 3px 0 var(--brown), 0 0 20px rgba(249,211,66,0.4);
    letter-spacing: 1px;
    line-height: 1;
  }
  .game-subtitle {
    font-size: 0.85rem; color: var(--green-pale);
    letter-spacing: 2px; text-transform: uppercase;
    margin-top: 2px;
  }

  /* HUD */
  .hud {
    position: relative; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 480px;
    padding: 8px 16px;
    gap: 10px;
  }
  .hud-box {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 6px 14px;
    text-align: center;
    flex: 1;
  }
  .hud-label { font-size: 0.65rem; color: var(--green-pale); text-transform: uppercase; letter-spacing: 1.5px; }
  .hud-value { font-size: 1.3rem; font-weight: 900; color: var(--yellow); line-height: 1.2; }

  /* LEVEL SELECTOR */
  .level-bar {
    position: relative; z-index: 10;
    display: flex; gap: 8px;
    padding: 4px 16px 8px;
    justify-content: center;
    max-width: 480px; width: 100%;
  }
  .level-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    color: var(--green-pale);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 4px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .level-btn.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: var(--brown);
  }

  /* GAME BOARD */
  .board-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 480px;
    padding: 0 12px 12px;
  }
  .board {
    display: grid;
    gap: 9px;
    width: 100%;
  }
  .board.grid-4 { grid-template-columns: repeat(4,1fr); }
  .board.grid-5 { grid-template-columns: repeat(5,1fr); }
  .board.grid-6 { grid-template-columns: repeat(6,1fr); }

  /* CARD */
  .card {
    aspect-ratio: 1;
    perspective: 700px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(.4,2,.6,1);
    border-radius: 14px;
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute; inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-back {
    background: var(--card-back);
    border: 3px solid var(--green-light);
    box-shadow: 0 4px 12px var(--shadow);
    font-size: 1.5rem;
  }
  .card-back::after {
    content: '🌿';
    font-size: 1.4rem;
    opacity: 0.8;
  }
  .card-front {
    background: var(--cream);
    border: 3px solid var(--green-light);
    transform: rotateY(180deg);
    font-size: 2rem;
    box-shadow: 0 4px 16px var(--shadow);
    flex-direction: column;
    gap: 2px;
  }
  .card-front .emoji { line-height: 1; }
  .card-front .name {
    font-size: 0.52rem;
    font-weight: 700;
    color: var(--brown);
    text-align: center;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    max-width: 90%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card.matched .card-front {
    background: #d4f7e0;
    border-color: var(--green-light);
    animation: matchPop 0.4s cubic-bezier(.4,2,.6,1);
  }
  @keyframes matchPop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.18); }
    100% { transform: rotateY(180deg) scale(1); }
  }
  .card.shake .card-inner { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-6px); }
    75% { transform: rotateY(180deg) translateX(6px); }
  }
  .card.disabled { pointer-events: none; }

  /* BUTTONS */
  .btn-row {
    position: relative; z-index: 10;
    display: flex; gap: 10px;
    padding: 4px 16px 8px;
    max-width: 480px; width: 100%;
  }
  .btn {
    flex: 1;
    background: var(--green-mid);
    border: 3px solid var(--green-light);
    border-radius: 14px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.95rem;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 0 var(--green-dark);
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--green-dark); }
  .btn.primary { background: var(--yellow); border-color: var(--orange); color: var(--brown); }

  /* MODAL overlay */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,30,15,0.85);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--cream);
    border-radius: 24px;
    padding: 32px 28px;
    max-width: 340px; width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: scale(0.8);
    transition: transform 0.35s cubic-bezier(.4,2,.6,1);
  }
  .modal-overlay.show .modal { transform: scale(1); }
  .modal-icon { font-size: 3.5rem; line-height: 1; margin-bottom: 8px; }
  .modal-title { font-family: 'Titan One', cursive; font-size: 1.8rem; color: var(--brown); margin-bottom: 6px; }
  .modal-sub { font-size: 0.95rem; color: #666; margin-bottom: 18px; line-height: 1.5; }
  .modal-stats { display: flex; gap: 12px; margin-bottom: 20px; }
  .modal-stat { flex:1; background: #f0f0e8; border-radius: 12px; padding: 10px 6px; }
  .modal-stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .modal-stat-val { font-size: 1.4rem; font-weight: 900; color: var(--green-dark); }
  .stars { font-size: 2rem; margin-bottom: 8px; letter-spacing: 4px; }

  /* TIMER BAR */
  .timer-bar-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 480px;
    padding: 0 16px 6px;
  }
  .timer-bar-bg {
    background: rgba(255,255,255,0.15);
    border-radius: 10px; height: 8px; overflow: hidden;
  }
  .timer-bar-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--green-light), var(--yellow));
    transition: width 1s linear, background 0.5s;
  }
  .timer-bar-fill.low { background: linear-gradient(90deg, #f4824a, #e03030); }

  /* COMBO badge */
  .combo-badge {
    position: fixed; top: 40%; left: 50%; transform: translateX(-50%) scale(0);
    z-index: 50; font-family: 'Titan One', cursive;
    font-size: 2rem; color: var(--yellow);
    text-shadow: 3px 3px 0 var(--brown);
    pointer-events: none;
    transition: transform 0.2s cubic-bezier(.4,2,.6,1), opacity 0.4s;
    opacity: 0;
  }
  .combo-badge.show { transform: translateX(-50%) scale(1); opacity: 1; }

  /* Particle burst */
  .particle { position: fixed; pointer-events: none; font-size: 1.4rem; z-index: 40;
    animation: particleFly 0.8s ease-out forwards; }
  @keyframes particleFly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
  }
</style>
</head>
<body>

<div class="bg-leaves" id="bgLeaves"></div>

<header>
  <div class="game-title">🐾 Wild Match</div>
  <div class="game-subtitle">Animal Puzzle Adventure</div>
</header>

<div class="hud">
  <div class="hud-box">
    <div class="hud-label">Moves</div>
    <div class="hud-value" id="movesVal">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Pairs</div>
    <div class="hud-value" id="pairsVal">0/0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="scoreVal">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Time</div>
    <div class="hud-value" id="timeVal">60</div>
  </div>
</div>

<div class="timer-bar-wrap">
  <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerBar"></div></div>
</div>

<div class="level-bar">
  <button class="level-btn active" onclick="setLevel(0,this)">🌱 Easy</button>
  <button class="level-btn" onclick="setLevel(1,this)">🌿 Medium</button>
  <button class="level-btn" onclick="setLevel(2,this)">🌳 Hard</button>
</div>

<div class="board-wrap">
  <div class="board grid-4" id="board"></div>
</div>

<div class="btn-row">
  <button class="btn" onclick="initGame()">🔄 Restart</button>
  <button class="btn primary" onclick="showHint()">💡 Hint</button>
</div>

<div class="combo-badge" id="comboBadge"></div>

<!-- WIN MODAL -->
<div class="modal-overlay" id="winModal">
  <div class="modal">
    <div class="modal-icon" id="winIcon">🎉</div>
    <div class="stars" id="winStars">⭐⭐⭐</div>
    <div class="modal-title" id="winTitle">You Win!</div>
    <div class="modal-sub" id="winSub">Amazing! All animals matched!</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-label">Moves</div><div class="modal-stat-val" id="resMoves">-</div></div>
      <div class="modal-stat"><div class="modal-stat-label">Time Left</div><div class="modal-stat-val" id="resTime">-</div></div>
      <div class="modal-stat"><div class="modal-stat-label">Score</div><div class="modal-stat-val" id="resScore">-</div></div>
    </div>
    <button class="btn primary" onclick="nextLevel()" style="margin-bottom:8px;width:100%">▶ Next Level</button>
    <button class="btn" onclick="closeModal()" style="width:100%">Play Again</button>
  </div>
</div>

<!-- LOSE MODAL -->
<div class="modal-overlay" id="loseModal">
  <div class="modal">
    <div class="modal-icon">⏰</div>
    <div class="modal-title">Time's Up!</div>
    <div class="modal-sub">So close! The animals are still hiding. Try again!</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-label">Pairs Found</div><div class="modal-stat-val" id="resPairs">-</div></div>
      <div class="modal-stat"><div class="modal-stat-label">Score</div><div class="modal-stat-val" id="resScore2">-</div></div>
    </div>
    <button class="btn primary" onclick="closeModal2();initGame()" style="width:100%">🔄 Try Again</button>
  </div>
</div>

<script>
// ——— DATA ———
const ANIMALS = [
  {e:'🐘',n:'Elephant'},{e:'🦁',n:'Lion'},{e:'🐯',n:'Tiger'},{e:'🦊',n:'Fox'},
  {e:'🐨',n:'Koala'},{e:'🦒',n:'Giraffe'},{e:'🐸',n:'Frog'},{e:'🦜',n:'Parrot'},
  {e:'🐬',n:'Dolphin'},{e:'🦋',n:'Butterfly'},{e:'🐧',n:'Penguin'},{e:'🦅',n:'Eagle'},
  {e:'🐺',n:'Wolf'},{e:'🦩',n:'Flamingo'},{e:'🐊',n:'Croc'},{e:'🦓',n:'Zebra'},
  {e:'🐙',n:'Octopus'},{e:'🦔',n:'Hedgehog'},
];

const LEVELS = [
  {name:'Easy',   cols:4, pairs:6,  time:90,  grid:'grid-4'},
  {name:'Medium', cols:4, pairs:10, time:75,  grid:'grid-4'},
  {name:'Hard',   cols:5, pairs:15, time:60,  grid:'grid-5'},
];

// ——— STATE ———
let level = 0;
let cards = [], flipped = [], matched = 0, moves = 0, score = 0, combo = 0;
let timer = 0, timerInterval = null, maxTime = 60;
let canFlip = true, hintTimeout = null;
let highScore = [0,0,0];

// ——— INIT ———
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function initGame(){
  clearInterval(timerInterval);
  closeModal(); closeModal2();
  const lvl = LEVELS[level];
  maxTime = lvl.time; timer = maxTime;
  moves = 0; score = 0; matched = 0; combo = 0; flipped = []; canFlip = true;
  updateHUD();

  const pool = shuffle([...ANIMALS]).slice(0, lvl.pairs);
  cards = shuffle([...pool, ...pool].map((a,i)=>({...a, id:i, flippedState:false, matchedState:false})));

  const board = document.getElementById('board');
  board.className = `board ${lvl.grid}`;
  board.innerHTML = '';
  cards.forEach((c,i)=> board.appendChild(createCard(c,i)));

  startTimer();
}

function createCard(c, idx){
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.idx = idx;
  el.innerHTML = `<div class="card-inner">
    <div class="card-back"></div>
    <div class="card-front"><span class="emoji">${c.e}</span><span class="name">${c.n}</span></div>
  </div>`;
  el.addEventListener('click', ()=> flipCard(el, idx));
  return el;
}

// ——— FLIP LOGIC ———
function flipCard(el, idx){
  if(!canFlip) return;
  const c = cards[idx];
  if(c.matchedState || c.flippedState) return;
  if(flipped.length === 2) return;

  c.flippedState = true;
  el.classList.add('flipped');
  flipped.push({el, idx});

  if(flipped.length === 2) {
    moves++;
    updateHUD();
    canFlip = false;
    setTimeout(checkMatch, 800);
  }
}

function checkMatch(){
  const [a,b] = flipped;
  if(cards[a.idx].e === cards[b.idx].e){
    cards[a.idx].matchedState = true;
    cards[b.idx].matchedState = true;
    a.el.classList.add('matched','disabled');
    b.el.classList.add('matched','disabled');
    matched++;
    combo++;
    const pts = 100 + (combo > 1 ? (combo-1)*50 : 0) + Math.floor(timer/maxTime*50);
    score += pts;
    showCombo(combo, pts, a.el);
    burst(a.el);
    flipped = [];
    canFlip = true;
    updateHUD();
    checkWin();
  } else {
    combo = 0;
    a.el.classList.add('shake');
    b.el.classList.add('shake');
    setTimeout(()=>{
      cards[a.idx].flippedState = false;
      cards[b.idx].flippedState = false;
      a.el.classList.remove('flipped','shake');
      b.el.classList.remove('flipped','shake');
      flipped = [];
      canFlip = true;
    }, 500);
  }
}

// ——— WIN / LOSE ———
function checkWin(){
  if(matched === LEVELS[level].pairs){
    clearInterval(timerInterval);
    const stars = timer > maxTime*0.6 ? '⭐⭐⭐' : timer > maxTime*0.3 ? '⭐⭐' : '⭐';
    const msgs = ['Incredible! You\'re a wildlife genius!','Great job! All animals matched!','Phew! You made it!'];
    const icons = ['🏆','🎉','🥳'];
    const starsN = stars.split('⭐').length - 1;
    document.getElementById('winStars').textContent = stars;
    document.getElementById('winTitle').textContent = starsN===3?'Perfect!':starsN===2?'Well Done!':'You Win!';
    document.getElementById('winSub').textContent = msgs[3-starsN];
    document.getElementById('winIcon').textContent = icons[3-starsN];
    document.getElementById('resMoves').textContent = moves;
    document.getElementById('resTime').textContent = timer+'s';
    document.getElementById('resScore').textContent = score;
    setTimeout(()=>document.getElementById('winModal').classList.add('show'),500);
  }
}

function nextLevel(){
  if(level < LEVELS.length-1){
    level++;
    document.querySelectorAll('.level-btn').forEach((b,i)=>{
      b.classList.toggle('active', i===level);
    });
  }
  closeModal();
  initGame();
}
function closeModal(){ document.getElementById('winModal').classList.remove('show'); }
function closeModal2(){ document.getElementById('loseModal').classList.remove('show'); }

// ——— TIMER ———
function startTimer(){
  updateTimerBar();
  timerInterval = setInterval(()=>{
    timer--;
    updateTimerBar();
    if(timer <= 0){
      clearInterval(timerInterval);
      document.getElementById('timeVal').textContent = '0';
      gameOver();
    }
  },1000);
}
function updateTimerBar(){
  document.getElementById('timeVal').textContent = timer;
  const pct = (timer/maxTime)*100;
  const bar = document.getElementById('timerBar');
  bar.style.width = pct+'%';
  bar.classList.toggle('low', pct < 30);
}
function gameOver(){
  canFlip = false;
  document.getElementById('resPairs').textContent = matched+'/'+LEVELS[level].pairs;
  document.getElementById('resScore2').textContent = score;
  setTimeout(()=>document.getElementById('loseModal').classList.add('show'),400);
}

// ——— HUD ———
function updateHUD(){
  document.getElementById('movesVal').textContent = moves;
  document.getElementById('pairsVal').textContent = matched+'/'+LEVELS[level].pairs;
  document.getElementById('scoreVal').textContent = score;
}

// ——— LEVEL SELECT ———
function setLevel(l, btn){
  level = l;
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  initGame();
}

// ——— HINT ———
function showHint(){
  if(!canFlip) return;
  score = Math.max(0, score - 20);
  updateHUD();
  const unmatched = cards.map((c,i)=>({c,i})).filter(x=>!x.c.matchedState && !x.c.flippedState);
  if(unmatched.length < 2) return;
  // Find a pair
  for(let i=0;i<unmatched.length;i++){
    for(let j=i+1;j<unmatched.length;j++){
      if(unmatched[i].c.e === unmatched[j].c.e){
        const el1 = document.querySelector(`[data-idx="${unmatched[i].i}"]`);
        const el2 = document.querySelector(`[data-idx="${unmatched[j].i}"]`);
        el1.classList.add('flipped'); el2.classList.add('flipped');
        clearTimeout(hintTimeout);
        hintTimeout = setTimeout(()=>{
          if(!cards[unmatched[i].i].matchedState) el1.classList.remove('flipped');
          if(!cards[unmatched[j].i].matchedState) el2.classList.remove('flipped');
        },1200);
        return;
      }
    }
  }
}

// ——— COMBO ———
function showCombo(c, pts, el){
  const badge = document.getElementById('comboBadge');
  if(c > 1){
    badge.textContent = `🔥 ${c}x COMBO! +${pts}`;
  } else {
    badge.textContent = `+${pts}`;
  }
  badge.classList.add('show');
  setTimeout(()=>badge.classList.remove('show'),1100);
}

// ——— PARTICLES ———
function burst(el){
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const emojis = ['🌿','🍃','✨','⭐','🌸'];
  for(let i=0;i<8;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = (Math.PI*2/8)*i;
    const dist = 60 + Math.random()*40;
    p.style.left = cx+'px'; p.style.top = cy+'px';
    p.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}

// ——— BG LEAVES ———
(function(){
  const container = document.getElementById('bgLeaves');
  const leafEmojis = ['🍃','🌿','🍀','🌱','🌾'];
  for(let i=0;i<18;i++){
    const l = document.createElement('div');
    l.className = 'leaf';
    l.textContent = leafEmojis[Math.floor(Math.random()*leafEmojis.length)];
    l.style.left = Math.random()*100+'vw';
    l.style.animationDuration = (8+Math.random()*14)+'s';
    l.style.animationDelay = (-Math.random()*15)+'s';
    l.style.fontSize = (1+Math.random()*1.2)+'rem';
    container.appendChild(l);
  }
})();

// ——— START ———
initGame();
</script>
</body>
</html>
